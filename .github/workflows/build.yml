name: Build OpenSquilla ARM64 Package

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
      with:
        platforms: arm64

    - name: Build OpenSquilla for ARM64
      run: |
        docker run --rm --platform linux/arm64 \
          -v ${{ github.workspace }}:/workspace \
          -w /workspace \
          python:3.12-bookworm \
          bash -c '
            set -e
            echo "=== Installing build tools ==="
            apt-get update && apt-get install -y \
              build-essential cmake git curl \
              libsqlite3-dev libffi-dev libssl-dev \
              && rm -rf /var/lib/apt/lists/*
            
            echo "=== Creating virtual environment ==="
            python -m venv /opt/opensquilla
            source /opt/opensquilla/bin/activate
            
            echo "=== Installing OpenSquilla ==="
            pip install --upgrade pip
            pip install opensquilla
            
            echo "=== Verifying installation ==="
            python -c "print(\"OpenSquilla installed successfully!\")"
            pip freeze > /workspace/requirements.txt
            
            echo "=== Creating package ==="
            cd /opt
            tar -czvf /workspace/opensquilla-arm64.tar.gz opensquilla/
            
            echo "=== Package created ==="
            ls -lh /workspace/opensquilla-arm64.tar.gz
          '

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: opensquilla-arm64-package
        path: opensquilla-arm64.tar.gz
        retention-days: 90

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v0.3.1-arm64-${{ github.run_number }}
        name: OpenSquilla ARM64 - Build #${{ github.run_number }}
        files: opensquilla-arm64.tar.gz
        body: |
          ## OpenSquilla ARM64 一键安装包
          
          **版本:** v0.3.1
          **平台:** linux/arm64 (Android Termux)
          
          ### 安装方法
          
          ```bash
          # 1. 下载并解压
          tar -xzvf opensquilla-arm64.tar.gz -C $HOME
          
          # 2. 激活环境
          source $HOME/opensquilla/bin/activate
          
          # 3. 运行
          opensquilla
          ```
          
          ---
          编译时间: ${{ github.event.head_commit.timestamp }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
